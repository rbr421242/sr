<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼠标位置改变文字颜色 · 随机一行</title>
    <style>
        :root {
            --hue: 200;
            --saturation: 80%;
            --lightness: 55%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0d0d0d;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 背景光晕 - 跟随鼠标 */
        .glow {
            position: fixed;
            pointer-events: none;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle,
                    hsla(var(--hue), var(--saturation), var(--lightness), 0.25) 0%,
                    hsla(var(--hue), var(--saturation), var(--lightness), 0.08) 40%,
                    transparent 70%);
            transform: translate(-50%, -50%);
            transition: background 0.15s ease-out;
            z-index: 0;
            will-change: left, top;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* 大标题（显示随机文本） */
        .hero-title {
            font-size: clamp(2rem, 6vw, 5rem); /* 稍微缩小一点，防止长文本溢出 */
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.2;
            transition: color 0.1s ease-out;
            color: hsl(var(--hue), var(--saturation), var(--lightness));
            text-shadow: 0 0 80px hsla(var(--hue), var(--saturation), var(--lightness), 0.5),
                0 0 160px hsla(var(--hue), var(--saturation), var(--lightness), 0.25);
            will-change: color, text-shadow;
            max-width: 90vw; /* 避免超长单行撑破屏幕 */
            word-break: break-word;
        }

        /* 副标题及描述文字默认隐藏，需要时再打开 */
        .subtitle,
        .description {
            display: none;
        }

        /* 粒子点 */
        .particle {
            position: fixed;
            pointer-events: none;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: hsl(var(--hue), var(--saturation), var(--lightness));
            box-shadow: 0 0 12px hsla(var(--hue), var(--saturation), var(--lightness), 0.8);
            z-index: 5;
            animation: particleFade 0.7s ease-out forwards;
            will-change: transform, opacity;
        }

        @keyframes particleFade {
            0% {
                transform: scale(1.5);
                opacity: 1;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .main-container {
                padding: 20px;
                gap: 20px;
            }
            .glow {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>
<body>

    <!-- 背景光晕 -->
    <div class="glow" id="glow"></div>
    <div class="main-container">
        <h1 class="hero-title" id="heroTitle">加载中…</h1>
        <p class="subtitle" id="subtitle">副标题</p>
        <p class="description" id="description">描述</p>
    </div>

    <script>
        (function() {
            // ---------- 原有 DOM 与颜色变量 ----------
            const glow = document.getElementById('glow');
            const heroTitle = document.getElementById('heroTitle');

            let currentHue = 200;
            let currentSaturation = 80;
            let currentLightness = 55;
            let targetHue = 200;
            let targetSaturation = 80;
            let targetLightness = 55;

            const SMOOTH_FACTOR = 0.18;
            let lastParticleTime = 0;
            const PARTICLE_THROTTLE = 35;

            function updateCSSVariables(h, s, l) {
                document.documentElement.style.setProperty('--hue', Math.round(h));
                document.documentElement.style.setProperty('--saturation', Math.round(s) + '%');
                document.documentElement.style.setProperty('--lightness', Math.round(l) + '%');
            }

            function spawnParticle(x, y) {
                const now = performance.now();
                if (now - lastParticleTime < PARTICLE_THROTTLE) return;
                lastParticleTime = now;

                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = `hsl(${Math.round(currentHue)}, ${Math.round(currentSaturation)}%, ${Math.round(currentLightness)}%)`;
                particle.style.boxShadow = `0 0 14px hsla(${Math.round(currentHue)}, ${Math.round(currentSaturation)}%, ${Math.round(currentLightness)}%, 0.7)`;
                document.body.appendChild(particle);

                particle.addEventListener('animationend', () => {
                    particle.remove();
                });
            }

            function handleMouseMove(e) {
                const x = e.clientX;
                const y = e.clientY;

                glow.style.left = x + 'px';
                glow.style.top = y + 'px';

                targetHue = (x / window.innerWidth) * 360;
                targetLightness = 90 - (y / window.innerHeight) * 75;
                targetSaturation = 65 + (x / window.innerWidth) * 30;

                spawnParticle(x, y);
            }

            function handleTouchMove(e) {
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    handleMouseMove({
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                }
            }

            function animate() {
                currentHue += (targetHue - currentHue) * SMOOTH_FACTOR;
                currentSaturation += (targetSaturation - currentSaturation) * SMOOTH_FACTOR;
                currentLightness += (targetLightness - currentLightness) * SMOOTH_FACTOR;

                updateCSSVariables(currentHue, currentSaturation, currentLightness);
                requestAnimationFrame(animate);
            }

            function initDefaultPosition() {
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                targetHue = (cx / window.innerWidth) * 360;
                targetLightness = 90 - (cy / window.innerHeight) * 75;
                targetSaturation = 65 + (cx / window.innerWidth) * 30;

                currentHue = targetHue;
                currentSaturation = targetSaturation;
                currentLightness = targetLightness;

                glow.style.left = cx + 'px';
                glow.style.top = cy + 'px';

                updateCSSVariables(currentHue, currentSaturation, currentLightness);
            }

            // ---------- 方案一：随机读取 data.txt ----------
            function loadRandomLine() {
                fetch('data.txt')
                    .then(response => {
                        if (!response.ok) throw new Error('文件加载失败');
                        return response.text();
                    })
                    .then(text => {
                        const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                        if (lines.length === 0) {
                            heroTitle.textContent = '文件中没有任何内容';
                            return;
                        }
                        const randomIndex = Math.floor(Math.random() * lines.length);
                        heroTitle.textContent = lines[randomIndex];
                    })
                    .catch(err => {
                        heroTitle.textContent = '读取失败：' + err.message;
                    });
            }

            // ---------- 事件绑定与启动 ----------
            window.addEventListener('mousemove', handleMouseMove, { passive: true });
            window.addEventListener('touchmove', handleTouchMove, { passive: true });
            window.addEventListener('touchstart', handleTouchMove, { passive: true });

            initDefaultPosition();
            requestAnimationFrame(animate);

            // 最后执行随机取词，直接覆盖“加载中…”
            loadRandomLine();

        })();
    </script>
</body>
</html>
